<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Under Development</title>

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/variables.css" />

    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f5f5;
      }

      .box {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      h1 {
        margin-bottom: 20px;
      }

      p {
        margin-bottom: 30px;
        color: #555;
      }

      button {
        padding: 10px 20px;
        border: none;
        background: #2c7a7b;
        color: white;
        cursor: pointer;
        border-radius: 5px;
      }

      button:hover {
        background: #225e5f;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h1>Page Under Development</h1>
      <p>This page is currently under development. Please come back later.</p>

      <button onclick="history.back()">Go Back</button>
    </div>
  </body>
</html>
